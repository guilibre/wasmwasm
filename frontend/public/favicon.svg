<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1d2e"/>
  <!-- top nodes -->
  <rect x="1"  y="5" width="5" height="5" rx="1.5" fill="#263238" stroke="#82aaff" stroke-width="1.2"/>
  <rect x="13" y="5" width="5" height="5" rx="1.5" fill="#263238" stroke="#82aaff" stroke-width="1.2"/>
  <rect x="26" y="5" width="5" height="5" rx="1.5" fill="#263238" stroke="#82aaff" stroke-width="1.2"/>
  <!-- valley nodes -->
  <rect x="7"  y="22" width="5" height="5" rx="1.5" fill="#263238" stroke="#82aaff" stroke-width="1.2"/>
  <rect x="20" y="22" width="5" height="5" rx="1.5" fill="#263238" stroke="#82aaff" stroke-width="1.2"/>
  <!-- wires -->
  <line x1="3.5"  y1="10" x2="9.5"  y2="22" stroke="#82aaff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9.5"  y1="22" x2="15.5" y2="10" stroke="#82aaff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15.5" y1="10" x2="22.5" y2="22" stroke="#82aaff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22.5" y1="22" x2="28.5" y2="10" stroke="#82aaff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- dots -->
  <circle cx="3.5"  cy="10"  r="1.2" fill="#82aaff"/>
  <circle cx="9.5"  cy="22" r="1.2" fill="#82aaff"/>
  <circle cx="15.5" cy="10"  r="1.2" fill="#82aaff"/>
  <circle cx="22.5" cy="22" r="1.2" fill="#82aaff"/>
  <circle cx="28.5" cy="10"  r="1.2" fill="#82aaff"/>
</svg>
